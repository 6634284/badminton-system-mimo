name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: pnpm run lint
        working-directory: server
      - run: npx tsc --noEmit
        working-directory: server

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: npx nest build admin-api
        working-directory: server
      - run: npx nest build client-api
        working-directory: server
      - run: npx nest build open-api
        working-directory: server
      - run: npx nest build worker
        working-directory: server
      - run: npx nest build scheduler
        working-directory: server

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: badminton_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/badminton_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: npx prisma db push
        working-directory: server
      - run: pnpm test
        working-directory: server

  admin-web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: admin-web
      - run: npx tsc --noEmit
        working-directory: admin-web
      - run: npx vite build
        working-directory: admin-web
